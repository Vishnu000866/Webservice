<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lego Robot Control</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f5f7;
            margin: 0;
            padding: 30px;
        }

        h1 {
            color: #222;
        }

        .box {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button.stop {
            background: #dc2626;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            width: 120px;
        }

        pre {
            background: #111827;
            color: #d1fae5;
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h1>Lego Robot Web Service Control</h1>

    <div class="box">
        <h2>Robot Settings</h2>

        <label>Speed:</label>
        <input type="number" id="speed" value="150">

        <label>Mode:</label>
        <select id="mode">
            <option value="0">Free driving</option>
            <option value="1">Line following</option>
        </select>

        <label>Obstacle limit cm:</label>
        <input type="number" id="obstacleLimit" value="20">

        <label>Avoid action:</label>
        <select id="avoidAction">
            <option value="0">Stop</option>
            <option value="1">Turn</option>
            <option value="2">Reverse</option>
        </select>

        <br><br>

        <button onclick="sendCommand(1, 0)">Forward</button>
        <button onclick="sendCommand(1, 1)">Left</button>
        <button onclick="sendCommand(1, 2)">Right</button>
        <button onclick="sendCommand(1, 3)">Backward</button>
        <button class="stop" onclick="sendCommand(0, 0)">Stop</button>
    </div>

    <div class="box">
        <h2>Current Settings</h2>
        <pre id="settings">No settings yet</pre>
    </div>

    <div class="box">
        <h2>Latest Robot Data</h2>
        <pre id="robotdata">No robot data yet</pre>
    </div>

    <div class="box">
        <h2>Statistics</h2>
        <pre id="statistics">No statistics yet</pre>
    </div>

<script>
    function sendCommand(runValue, turnValue) {
        let lego = {
            run: runValue,
            speed: Number(document.getElementById("speed").value),
            turn: turnValue,
            mode: Number(document.getElementById("mode").value),
            obstacleLimit: Number(document.getElementById("obstacleLimit").value),
            avoidAction: Number(document.getElementById("avoidAction").value)
        };

        fetch("/rest/lego/setvalues", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(lego)
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById("settings").textContent = JSON.stringify(data, null, 2);
            loadData();
        })
        .catch(error => {
            document.getElementById("settings").textContent = "Error: " + error;
        });
    }

    function loadData() {
        fetch("/rest/lego/currentsettings")
        .then(response => response.json())
        .then(data => {
            document.getElementById("settings").textContent = JSON.stringify(data, null, 2);
        });

        fetch("/rest/lego/robotdata")
        .then(response => response.json())
        .then(data => {
            document.getElementById("robotdata").textContent = JSON.stringify(data, null, 2);
        });

        fetch("/rest/lego/statistics")
        .then(response => response.text())
        .then(data => {
            document.getElementById("statistics").textContent = data;
        });
    }

    setInterval(loadData, 2000);
    loadData();
</script>

</body>
</html>
